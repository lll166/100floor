<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加油，拓海同学！</title>
    <style>
        :root {
            --btn-size: 64px;
            --hitbox-expand: 20px;
            --bottom-gap: 25px;
            --side-gap: 20px;
        }

        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        #game-wrapper {
            position: relative; width: 100%; max-width: 450px; height: 100%;
            background: #000; overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* 得分 UI */
        #hud {
            position: absolute; top: 20px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 10; pointer-events: none;
        }
        .stat-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 6px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 14px; font-weight: bold; letter-spacing: 1px;
        }

        /* 按键布局 */
        .touch-controls {
            position: absolute; bottom: var(--bottom-gap); left: 0; right: 0;
            padding: 0 var(--side-gap);
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 100; pointer-events: none;
        }
        .dir-group { display: flex; gap: 12px; pointer-events: auto; }
        .jump-group { pointer-events: auto; }
        .btn {
            position: relative; width: var(--btn-size); height: var(--btn-size);
            background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 20px; user-select: none;
            -webkit-tap-highlight-color: transparent; transition: transform 0.05s;
        }
        .btn::after {
            content: ''; position: absolute; top: calc(-1 * var(--hitbox-expand));
            left: calc(-1 * var(--hitbox-expand)); right: calc(-1 * var(--hitbox-expand));
            bottom: calc(-1 * var(--hitbox-expand)); border-radius: 50%;
        }
        .btn:active { transform: scale(0.85); background: rgba(255,255,255,0.3); }
        #jump-btn { width: 76px; height: 76px; background: rgba(0, 168, 255, 0.2); border-color: rgba(0, 168, 255, 0.4); font-weight: bold; font-size: 16px; }

        /* 结算面板 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 200;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #status-title { margin: 0; color: #333; font-size: 1.8rem; line-height: 1.4; }
        #overlay p { color: #666; font-size: 1.1rem; margin: 10px 0; }
        #overlay button {
            margin-top: 30px; padding: 15px 50px; background: #000; color: #fff;
            border: none; border-radius: 50px; font-size: 1rem; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div class="stat-box">FLOOR: <span id="floor-val">0</span> / 100</div>
    </div>

    <div id="overlay">
        <h1 id="status-title">GAME OVER</h1>
        <p id="sub-msg">你到达了第 <span id="final-floor">0</span> 层</p>
        <button onclick="resetGame()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="touch-controls">
        <div class="dir-group">
            <div class="btn" id="left-btn">←</div>
            <div class="btn" id="right-btn">→</div>
        </div>
        <div class="jump-group">
            <div class="btn" id="jump-btn">JUMP</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const LOGICAL_W = 450;
    const LOGICAL_H = 800;
    canvas.width = LOGICAL_W;
    canvas.height = LOGICAL_H;

    const CONFIG = {
        gravity: 0.65,
        jump: -13,
        moveSpeed: 7.5,
        scrollSpeed: 2.3,
        playerW: 24,
        playerH: 40
    };

    let state = {
        player: {},
        platforms: [],
        stars: [],
        confetti: [], // 庆祝特效粒子
        score: 0,
        isOver: false,
        isWin: false,
        lastX: LOGICAL_W / 2,
        input: { left: false, right: false, jump: false }
    };

    // --- 庆祝特效：彩带粒子系统 ---
    function createConfetti() {
        for (let i = 0; i < 100; i++) {
            state.confetti.push({
                x: Math.random() * LOGICAL_W,
                y: -Math.random() * 20,
                vx: (Math.random() - 0.5) * 10,
                vy: Math.random() * 5 + 2,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                size: Math.random() * 6 + 4,
                rotation: Math.random() * 360,
                rSpeed: (Math.random() - 0.5) * 10
            });
        }
    }

    function updateConfetti() {
        state.confetti.forEach(c => {
            c.x += c.vx;
            c.y += c.vy;
            c.rotation += c.rSpeed;
            if (c.y > LOGICAL_H) { c.y = -20; c.x = Math.random() * LOGICAL_W; }
        });
    }

    function drawConfetti() {
        state.confetti.forEach(c => {
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.rotation * Math.PI / 180);
            ctx.fillStyle = c.color;
            ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size/2);
            ctx.restore();
        });
    }

    // --- 主角绘制 ---
    function drawPlayer() {
        const p = state.player;
        ctx.save();
        ctx.translate(p.x + CONFIG.playerW/2, p.y + CONFIG.playerH/2);
        if (p.facing === -1) ctx.scale(-1, 1);
        const w = CONFIG.playerW; const h = CONFIG.playerH;
        ctx.fillStyle = '#111'; ctx.fillRect(-w/2 + 4, 0, w - 8, h/2); 
        ctx.fillStyle = '#FFF'; ctx.fillRect(-w/2 + 4, 10, 2, 8); 
        ctx.fillStyle = '#FFF'; ctx.fillRect(-w/2 + 2, -h/2 + 6, w-4, h*0.6);
        ctx.fillStyle = '#1D2A4F'; ctx.fillRect(-w/2, -h/2 + 8, w * 0.6, h * 0.5);
        ctx.fillStyle = '#4A5B69'; ctx.fillRect(-w/2 + w*0.6, -h/2 + 8, w*0.4, h*0.5);
        ctx.fillStyle = '#fce2c4'; ctx.fillRect(-w/2 + 6, -h/2 + 2, w-12, 10);
        ctx.fillStyle = '#C61B23'; ctx.fillRect(-w/2 + 4, -h/2 - 2, w-8, 6);
        ctx.fillStyle = '#120E15'; ctx.fillRect(-w/2 + 6, -h/2 + 3, 4, 3);
        ctx.fillRect(-w/2 + 10, -h/2 + 1, 2, 2);
        ctx.fillStyle = '#000'; ctx.fillRect(w/2 - 8, -h/2 + 6, 2, 2);
        ctx.restore();
    }

    // --- 核心逻辑 ---
    function spawnPlatform(y) {
        const width = 85 + Math.random() * 40;
        let x = state.lastX - 140 + Math.random() * 280;
        x = Math.max(20, Math.min(LOGICAL_W - width - 20, x));
        state.lastX = x;
        let type = (state.score > 8 && Math.random() < 0.22) ? 'spike' : 'normal';
        state.platforms.push({ x, y, width, height: 12, type });
    }

    function update() {
        if (state.isOver && !state.isWin) return;
        
        // 如果赢了，只更新纸屑
        if (state.isWin) {
            updateConfetti();
            return;
        }

        const p = state.player;
        if (state.input.left) { p.vx = -CONFIG.moveSpeed; p.facing = -1; }
        else if (state.input.right) { p.vx = CONFIG.moveSpeed; p.facing = 1; }
        else { p.vx *= 0.82; }

        p.vy += CONFIG.gravity;
        p.x += p.vx; p.y += p.vy;

        if (p.x < 0) p.x = 0;
        if (p.x > LOGICAL_W - CONFIG.playerW) p.x = LOGICAL_W - CONFIG.playerW;

        for (let i = state.platforms.length - 1; i >= 0; i--) {
            let plat = state.platforms[i];
            plat.y -= CONFIG.scrollSpeed;
            if (p.vy > 0 && p.y + CONFIG.playerH >= plat.y && p.y + CONFIG.playerH <= plat.y + 12 + p.vy &&
                p.x + CONFIG.playerW > plat.x && p.x < plat.x + plat.width) {
                if (plat.type === 'spike') { endGame(false); return; }
                p.y = plat.y - CONFIG.playerH; p.vy = 0;
                if (state.input.jump) p.vy = CONFIG.jump;
            }
            if (plat.y < -20) {
                state.platforms.splice(i, 1);
                state.score++;
                document.getElementById('floor-val').innerText = state.score;
                if (state.score >= 100) { endGame(true); return; }
            }
        }

        if (state.platforms[state.platforms.length-1].y < LOGICAL_H) {
            spawnPlatform(state.platforms[state.platforms.length-1].y + 115);
        }
        if (p.y > LOGICAL_H || p.y < -60) endGame(false);

        state.stars.forEach(s => {
            s.opacity += s.pulse;
            if (s.opacity > 1 || s.opacity < 0.2) s.pulse *= -1;
        });
    }

    function draw() {
        const sky = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
        sky.addColorStop(0, '#050508'); sky.addColorStop(1, '#0c0c16');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

        state.stars.forEach(s => {
            ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        });

        state.platforms.forEach(plat => {
            if (plat.type === 'normal') {
                const g = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y+12);
                g.addColorStop(0, 'rgba(255,255,255,0.98)'); g.addColorStop(1, 'rgba(215,225,255,0.85)');
                ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(plat.x, plat.y, plat.width, 12, 6); ctx.fill();
            } else {
                ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.roundRect(plat.x, plat.y+4, plat.width, 8, 4); ctx.fill();
                for(let i=0; i<plat.width; i+=10) { ctx.moveTo(plat.x+i, plat.y+4); ctx.lineTo(plat.x+i+5, plat.y-4); ctx.lineTo(plat.x+i+10, plat.y+4); }
                ctx.fill();
            }
        });

        if (!state.isWin) drawPlayer();
        if (state.isWin) drawConfetti();
    }

    function initGame() {
        state.score = 0; state.isOver = false; state.isWin = false; state.lastX = LOGICAL_W/2;
        state.confetti = [];
        document.getElementById('floor-val').innerText = '0';
        document.getElementById('overlay').style.display = 'none';
        state.player = { x: LOGICAL_W/2 - 12, y: 150, vx: 0, vy: 0, facing: 1 };
        state.platforms = [{ x: LOGICAL_W/2-60, y: 350, width: 120, type: 'normal' }];
        for(let i=0; i<7; i++) spawnPlatform(350 + (i+1)*115);
        state.stars = Array.from({length: 40}, () => ({
            x: Math.random() * LOGICAL_W, y: Math.random() * LOGICAL_H,
            size: Math.random() * 2, opacity: Math.random(), pulse: 0.01 + Math.random()*0.02
        }));
        loop();
    }

    function loop() {
        update(); draw();
        if (!state.isOver || state.isWin) requestAnimationFrame(loop);
    }

    function endGame(win) {
        state.isOver = true;
        const title = document.getElementById('status-title');
        const overlay = document.getElementById('overlay');
        const subMsg = document.getElementById('sub-msg');
        
        overlay.style.display = 'flex';
        document.getElementById('final-floor').innerText = state.score;

        if (win) {
            state.isWin = true;
            title.innerText = "你办到了呢，\n拓海同学。";
            title.style.color = "#9a9ee6"; 
            subMsg.innerHTML = "谢谢你。";
            createConfetti();
        } else {
            state.isWin = false;
            title.innerText = "FAILED";
            title.style.color = "#ff4757";
            subMsg.innerHTML = `你到达了第 ${state.score} 层`;
        }
    }

    function resetGame() { initGame(); }

    const handleInput = (key, val) => {
        if (['ArrowLeft', 'a'].includes(key)) state.input.left = val;
        if (['ArrowRight', 'd'].includes(key)) state.input.right = val;
        if (['ArrowUp', 'w', ' '].includes(key)) state.input.jump = val;
    };

    window.addEventListener('keydown', e => handleInput(e.key, true));
    window.addEventListener('keyup', e => handleInput(e.key, false));

    const bindTouch = (id, key) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', e => { e.preventDefault(); handleInput(key, true); }, {passive: false});
        btn.addEventListener('touchend', e => { e.preventDefault(); handleInput(key, false); }, {passive: false});
        btn.addEventListener('touchcancel', e => { e.preventDefault(); handleInput(key, false); }, {passive: false});
    };

    bindTouch('left-btn', 'ArrowLeft');
    bindTouch('right-btn', 'ArrowRight');
    bindTouch('jump-btn', 'ArrowUp');

    initGame();
</script>
</body>
</html>
