<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加油，拓海同学！</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.2);
            --ui-border: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none; /* 禁用系统缩放和滚动 */
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 800px;
            background: #000;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 顶部得分栏 */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--ui-border);
            color: white;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 手机虚拟按键容器 */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            z-index: 20;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: var(--ui-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--ui-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.9);
        }

        #jump-btn {
            background: rgba(0, 168, 255, 0.3);
        }

        /* 游戏结束面板 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }

        #overlay h1 { font-size: 2.5rem; margin: 0; color: #333; }
        #overlay p { color: #666; margin: 15px 0 30px; }
        #overlay button {
            padding: 15px 50px;
            background: #222;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div class="stat-box">FLOOR: <span id="floor-val">0</span> / 100</div>
    </div>

    <div id="overlay">
        <h1 id="status-title">GAME OVER</h1>
        <p>你到达了第 <span id="final-floor">0</span> 层</p>
        <button onclick="resetGame()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="ctrl-btn" id="left-btn">←</div>
        <div class="ctrl-btn" id="jump-btn">↑</div>
        <div class="ctrl-btn" id="right-btn">→</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const floorVal = document.getElementById('floor-val');
    const overlay = document.getElementById('overlay');
    
    // 逻辑分辨率保持不变，渲染时缩放
    const LOGICAL_W = 450;
    const LOGICAL_H = 800;
    canvas.width = LOGICAL_W;
    canvas.height = LOGICAL_H;

    const CONFIG = {
        gravity: 0.6,
        jump: -13,
        moveSpeed: 7,
        scrollSpeed: 2.2,
        playerW: 24,
        playerH: 40
    };

    let state = {
        player: {},
        platforms: [],
        stars: [],
        score: 0,
        isOver: false,
        lastX: LOGICAL_W / 2,
        input: { left: false, right: false, jump: false }
    };

    function initStars() {
        state.stars = Array.from({length: 60}, () => ({
            x: Math.random() * LOGICAL_W,
            y: Math.random() * LOGICAL_H,
            size: Math.random() * 2,
            opacity: Math.random(),
            pulse: 0.01 + Math.random() * 0.02
        }));
    }

    function spawnPlatform(y) {
        const width = 80 + Math.random() * 40;
        // 算法确保平台在可达范围内
        let x = state.lastX - 120 + Math.random() * 240;
        x = Math.max(20, Math.min(LOGICAL_W - width - 20, x));
        state.lastX = x;

        let type = 'normal';
        if (state.score > 10 && Math.random() < 0.25) type = 'spike';

        state.platforms.push({ x, y, width, height: 12, type });
    }

    function drawPlayer() {
        const p = state.player;
        ctx.save();
        ctx.translate(p.x + CONFIG.playerW/2, p.y + CONFIG.playerH/2);
        if (p.facing === -1) ctx.scale(-1, 1);

        const w = CONFIG.playerW;
        const h = CONFIG.playerH;

        // 裤子 & 绑带细节
        ctx.fillStyle = '#111';
        ctx.fillRect(-w/2 + 4, 0, w - 8, h/2); 
        ctx.fillStyle = '#FFF'; 
        ctx.fillRect(-w/2 + 4, 10, 2, 8); // 右腿白绑带

        // 帽衫外套 (拼色)
        ctx.fillStyle = '#FFF'; // 内部
        ctx.fillRect(-w/2 + 2, -h/2 + 6, w-4, h*0.6);
        ctx.fillStyle = '#1D2A4F'; // 拼色1: 深蓝
        ctx.fillRect(-w/2, -h/2 + 8, w * 0.6, h * 0.5);
        ctx.fillStyle = '#4A5B69'; // 拼色2: 灰
        ctx.fillRect(-w/2 + w*0.6, -h/2 + 8, w*0.4, h*0.5);

        // 脸部
        ctx.fillStyle = '#ffdbac';
        ctx.fillRect(-w/2 + 6, -h/2 + 2, w-12, 10);

        // 头发 (红发 + 油黑挑染)
        ctx.fillStyle = '#C61B23'; // 主色红
        ctx.fillRect(-w/2 + 4, -h/2 - 2, w-8, 6);
        ctx.fillStyle = '#120E15'; // 挑染黑
        ctx.fillRect(-w/2 + 6, -h/2 + 3, 3, 3);
        ctx.fillRect(-w/2 + 10, -h/2 + 1, 2, 2);

        // 眼睛
        ctx.fillStyle = '#000';
        ctx.fillRect(w/2 - 8, -h/2 + 6, 2, 2);

        ctx.restore();
    }

    function update() {
        if (state.isOver) return;
        const p = state.player;

        // 输入响应
        if (state.input.left) { p.vx = -CONFIG.moveSpeed; p.facing = -1; }
        else if (state.input.right) { p.vx = CONFIG.moveSpeed; p.facing = 1; }
        else { p.vx *= 0.8; }

        p.vy += CONFIG.gravity;
        p.x += p.vx;
        p.y += p.vy;

        // 边界
        if (p.x < 0) p.x = 0;
        if (p.x > LOGICAL_W - CONFIG.playerW) p.x = LOGICAL_W - CONFIG.playerW;

        // 平台逻辑
        for (let i = state.platforms.length - 1; i >= 0; i--) {
            let plat = state.platforms[i];
            plat.y -= CONFIG.scrollSpeed;

            if (p.vy > 0 && 
                p.y + CONFIG.playerH >= plat.y && 
                p.y + CONFIG.playerH <= plat.y + 12 + p.vy &&
                p.x + CONFIG.playerW > plat.x && p.x < plat.x + plat.width) {
                
                if (plat.type === 'spike') { endGame(); return; }
                p.y = plat.y - CONFIG.playerH;
                p.vy = 0;
                if (state.input.jump) p.vy = CONFIG.jump;
            }

            if (plat.y < -20) {
                state.platforms.splice(i, 1);
                state.score++;
                floorVal.innerText = state.score;
                if (state.score >= 100) endGame(true);
            }
        }

        if (state.platforms[state.platforms.length-1].y < LOGICAL_H) {
            spawnPlatform(state.platforms[state.platforms.length-1].y + 115);
        }

        if (p.y > LOGICAL_H || p.y < -50) endGame();

        state.stars.forEach(s => {
            s.opacity += s.pulse;
            if (s.opacity > 1 || s.opacity < 0.2) s.pulse *= -1;
        });
    }

    function draw() {
        const sky = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
        sky.addColorStop(0, '#05050a'); sky.addColorStop(1, '#101020');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

        state.stars.forEach(s => {
            ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        });

        state.platforms.forEach(plat => {
            ctx.save();
            if (plat.type === 'normal') {
                const g = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y+12);
                g.addColorStop(0, '#fff'); g.addColorStop(1, '#ccd');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.roundRect(plat.x, plat.y, plat.width, 12, 6); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.stroke();
            } else {
                ctx.fillStyle = '#ff4757';
                ctx.beginPath(); ctx.roundRect(plat.x, plat.y+4, plat.width, 8, 4); ctx.fill();
                for(let i=0; i<plat.width; i+=10) {
                    ctx.moveTo(plat.x+i, plat.y+4); ctx.lineTo(plat.x+i+5, plat.y-4); ctx.lineTo(plat.x+i+10, plat.y+4);
                }
                ctx.fill();
            }
            ctx.restore();
        });
        drawPlayer();
    }

    function initGame() {
        state.score = 0; state.isOver = false; state.lastX = LOGICAL_W/2;
        floorVal.innerText = '0'; overlay.style.display = 'none';
        state.player = { x: LOGICAL_W/2 - 12, y: 150, vx: 0, vy: 0, facing: 1 };
        state.platforms = [{ x: LOGICAL_W/2-60, y: 350, width: 120, type: 'normal' }];
        for(let i=0; i<6; i++) spawnPlatform(350 + (i+1)*115);
        initStars();
        loop();
    }

    function loop() {
        update(); draw();
        if (!state.isOver) requestAnimationFrame(loop);
    }

    function endGame(win) {
        state.isOver = true;
        overlay.style.display = 'flex';
        document.getElementById('final-floor').innerText = state.score;
        document.getElementById('status-title').innerText = win ? "CLEAR!" : "OVER";
        document.getElementById('status-title').style.color = win ? "#2ed573" : "#ff4757";
    }

    function resetGame() { initGame(); }

    // 控制处理 (键盘+触控)
    const handleInput = (key, val) => {
        if (['ArrowLeft', 'a'].includes(key)) state.input.left = val;
        if (['ArrowRight', 'd'].includes(key)) state.input.right = val;
        if (['ArrowUp', 'w', ' '].includes(key)) state.input.jump = val;
    };

    window.addEventListener('keydown', e => handleInput(e.key, true));
    window.addEventListener('keyup', e => handleInput(e.key, false));

    const bindTouch = (id, key) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', e => { e.preventDefault(); handleInput(key, true); });
        btn.addEventListener('touchend', e => { e.preventDefault(); handleInput(key, false); });
    };

    bindTouch('left-btn', 'ArrowLeft');
    bindTouch('right-btn', 'ArrowRight');
    bindTouch('jump-btn', 'ArrowUp');

    initGame();
</script>
</body>
</html>
