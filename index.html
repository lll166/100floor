<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简星空 - 触控优化版</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.15);
            --ui-border: rgba(255, 255, 255, 0.25);
            /* --- 触发距离控制 --- */
            --hitbox-size: 100px; /* 实际手指感应区域的大小 */
            --visual-size: 65px;  /* 眼睛看到的按钮大小 */
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
            font-family: -apple-system, sans-serif;
        }

        #game-wrapper {
            position: relative;
            width: 100%; max-width: 450px; height: 100%; max-height: 850px;
            background: #000; overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* 顶部 UI */
        #hud {
            position: absolute; top: 25px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 10;
        }
        .stat-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 8px 25px; border-radius: 30px; border: 1px solid var(--ui-border);
            color: white; font-weight: bold; letter-spacing: 1px;
        }

        /* --- 优化的触控区域布局 --- */
        #controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            padding: 0 25px;
            display: flex; justify-content: space-between; /* 左右分开布局 */
            align-items: flex-end; z-index: 20;
            pointer-events: none; /* 让容器不挡住点击 */
        }

        .direction-group { display: flex; gap: 20px; pointer-events: auto; }
        .jump-group { pointer-events: auto; }

        .ctrl-btn {
            position: relative;
            width: var(--visual-size); height: var(--visual-size);
            background: var(--ui-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--ui-border); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px; font-weight: bold;
            transition: transform 0.1s, background 0.1s;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* 核心：通过伪元素扩大触发距离 */
        .ctrl-btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: var(--hitbox-size); height: var(--hitbox-size);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            /* background: rgba(255,0,0,0.2); // 调试时可以打开，看看感应区有多大 */
        }

        .ctrl-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.4);
        }

        #jump-btn {
            width: 85px; height: 85px; /* 跳跃键稍微大一点 */
            background: rgba(0, 168, 255, 0.25);
            border: 1.5px solid rgba(0, 168, 255, 0.4);
        }

        /* 结算面板 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 30;
        }
        #overlay h1 { font-size: 2.5rem; color: #333; margin: 0; }
        #overlay button {
            margin-top: 30px; padding: 15px 60px;
            background: #000; color: #fff; border: none; border-radius: 50px; font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div class="stat-box">FLOOR: <span id="floor-val">0</span> / 100</div>
    </div>

    <div id="overlay">
        <h1 id="status-title">GAME OVER</h1>
        <p>你到达了第 <span id="final-floor">0</span> 层</p>
        <button onclick="resetGame()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="direction-group">
            <div class="ctrl-btn" id="left-btn">←</div>
            <div class="ctrl-btn" id="right-btn">→</div>
        </div>
        <div class="jump-group">
            <div class="ctrl-btn" id="jump-btn">JUMP</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const LOGICAL_W = 450;
    const LOGICAL_H = 800;
    canvas.width = LOGICAL_W;
    canvas.height = LOGICAL_H;

    const CONFIG = {
        gravity: 0.6,
        jump: -13,
        moveSpeed: 7,
        scrollSpeed: 2.2,
        playerW: 24,
        playerH: 40
    };

    let state = {
        player: {},
        platforms: [],
        stars: [],
        score: 0,
        isOver: false,
        lastX: LOGICAL_W / 2,
        input: { left: false, right: false, jump: false }
    };

    // --- 主角绘制 (红发黑挑染、拼色外套、腿部绑带) ---
    function drawPlayer() {
        const p = state.player;
        ctx.save();
        ctx.translate(p.x + CONFIG.playerW/2, p.y + CONFIG.playerH/2);
        if (p.facing === -1) ctx.scale(-1, 1);

        const w = CONFIG.playerW; const h = CONFIG.playerH;

        // 1. 裤子 & 右腿绑带
        ctx.fillStyle = '#111'; ctx.fillRect(-w/2 + 4, 0, w - 8, h/2); 
        ctx.fillStyle = '#FFF'; ctx.fillRect(-w/2 + 4, 10, 2, 8); 

        // 2. 拼色外套 (白色内里+深蓝/灰拼色)
        ctx.fillStyle = '#FFF'; ctx.fillRect(-w/2 + 2, -h/2 + 6, w-4, h*0.6);
        ctx.fillStyle = '#1D2A4F'; ctx.fillRect(-w/2, -h/2 + 8, w * 0.6, h * 0.5);
        ctx.fillStyle = '#4A5B69'; ctx.fillRect(-w/2 + w*0.6, -h/2 + 8, w*0.4, h*0.5);

        // 3. 脸部
        ctx.fillStyle = '#ffdbac'; ctx.fillRect(-w/2 + 6, -h/2 + 2, w-12, 10);

        // 4. 头发细节 (红发+黑挑染)
        ctx.fillStyle = '#C61B23'; ctx.fillRect(-w/2 + 4, -h/2 - 2, w-8, 6);
        ctx.fillStyle = '#120E15'; // 黑色挑染像素
        ctx.fillRect(-w/2 + 6, -h/2 + 3, 3, 3);
        ctx.fillRect(-w/2 + 10, -h/2 + 1, 2, 2);

        // 5. 眼睛
        ctx.fillStyle = '#000'; ctx.fillRect(w/2 - 8, -h/2 + 6, 2, 2);

        ctx.restore();
    }

    // --- 核心逻辑 ---
    function initStars() {
        state.stars = Array.from({length: 50}, () => ({
            x: Math.random() * LOGICAL_W,
            y: Math.random() * LOGICAL_H,
            size: Math.random() * 2,
            opacity: Math.random(),
            pulse: 0.01 + Math.random() * 0.02
        }));
    }

    function spawnPlatform(y) {
        const width = 80 + Math.random() * 40;
        let x = state.lastX - 130 + Math.random() * 260; // 优化可达性
        x = Math.max(20, Math.min(LOGICAL_W - width - 20, x));
        state.lastX = x;
        let type = (state.score > 10 && Math.random() < 0.25) ? 'spike' : 'normal';
        state.platforms.push({ x, y, width, height: 12, type });
    }

    function update() {
        if (state.isOver) return;
        const p = state.player;

        if (state.input.left) { p.vx = -CONFIG.moveSpeed; p.facing = -1; }
        else if (state.input.right) { p.vx = CONFIG.moveSpeed; p.facing = 1; }
        else { p.vx *= 0.8; }

        p.vy += CONFIG.gravity;
        p.x += p.vx; p.y += p.vy;

        if (p.x < 0) p.x = 0;
        if (p.x > LOGICAL_W - CONFIG.playerW) p.x = LOGICAL_W - CONFIG.playerW;

        for (let i = state.platforms.length - 1; i >= 0; i--) {
            let plat = state.platforms[i];
            plat.y -= CONFIG.scrollSpeed;

            if (p.vy > 0 && 
                p.y + CONFIG.playerH >= plat.y && 
                p.y + CONFIG.playerH <= plat.y + 12 + p.vy &&
                p.x + CONFIG.playerW > plat.x && p.x < plat.x + plat.width) {
                
                if (plat.type === 'spike') { endGame(); return; }
                p.y = plat.y - CONFIG.playerH;
                p.vy = 0;
                if (state.input.jump) p.vy = CONFIG.jump;
            }

            if (plat.y < -20) {
                state.platforms.splice(i, 1);
                state.score++;
                document.getElementById('floor-val').innerText = state.score;
                if (state.score >= 100) endGame(true);
            }
        }

        if (state.platforms[state.platforms.length-1].y < LOGICAL_H) {
            spawnPlatform(state.platforms[state.platforms.length-1].y + 115);
        }

        if (p.y > LOGICAL_H || p.y < -50) endGame();

        state.stars.forEach(s => {
            s.opacity += s.pulse;
            if (s.opacity > 1 || s.opacity < 0.2) s.pulse *= -1;
        });
    }

    function draw() {
        const sky = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
        sky.addColorStop(0, '#05050a'); sky.addColorStop(1, '#0e0e1a');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

        state.stars.forEach(s => {
            ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        });

        state.platforms.forEach(plat => {
            ctx.save();
            if (plat.type === 'normal') {
                const g = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y+12);
                g.addColorStop(0, 'rgba(255,255,255,0.95)'); g.addColorStop(1, 'rgba(210,220,255,0.8)');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.roundRect(plat.x, plat.y, plat.width, 12, 6); ctx.fill();
            } else {
                ctx.fillStyle = '#ff4757';
                ctx.beginPath(); ctx.roundRect(plat.x, plat.y+4, plat.width, 8, 4); ctx.fill();
                for(let i=0; i<plat.width; i+=10) {
                    ctx.moveTo(plat.x+i, plat.y+4); ctx.lineTo(plat.x+i+5, plat.y-4); ctx.lineTo(plat.x+i+10, plat.y+4);
                }
                ctx.fill();
            }
            ctx.restore();
        });
        drawPlayer();
    }

    function initGame() {
        state.score = 0; state.isOver = false; state.lastX = LOGICAL_W/2;
        document.getElementById('floor-val').innerText = '0';
        document.getElementById('overlay').style.display = 'none';
        state.player = { x: LOGICAL_W/2 - 12, y: 150, vx: 0, vy: 0, facing: 1 };
        state.platforms = [{ x: LOGICAL_W/2-60, y: 350, width: 120, type: 'normal' }];
        for(let i=0; i<6; i++) spawnPlatform(350 + (i+1)*115);
        initStars();
        loop();
    }

    function loop() {
        update(); draw();
        if (!state.isOver) requestAnimationFrame(loop);
    }

    function endGame(win) {
        state.isOver = true;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('final-floor').innerText = state.score;
        document.getElementById('status-title').innerText = win ? "CLEAR!" : "GAME OVER";
        document.getElementById('status-title').style.color = win ? "#2ed573" : "#ff4757";
    }

    function resetGame() { initGame(); }

    // --- 输入绑定 (带误触优化) ---
    const handleInput = (key, val) => {
        if (['ArrowLeft', 'a'].includes(key)) state.input.left = val;
        if (['ArrowRight', 'd'].includes(key)) state.input.right = val;
        if (['ArrowUp', 'w', ' '].includes(key)) state.input.jump = val;
    };

    window.addEventListener('keydown', e => handleInput(e.key, true));
    window.addEventListener('keyup', e => handleInput(e.key, false));

    const bindTouch = (id, key) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', e => { e.preventDefault(); handleInput(key, true); });
        btn.addEventListener('touchend', e => { e.preventDefault(); handleInput(key, false); });
        btn.addEventListener('touchcancel', e => { e.preventDefault(); handleInput(key, false); });
    };

    bindTouch('left-btn', 'ArrowLeft');
    bindTouch('right-btn', 'ArrowRight');
    bindTouch('jump-btn', 'ArrowUp');

    initGame();
</script>
</body>
</html>
