<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简星空挑战 - 立绘级像素版</title>
    <style>
        :root {
            --primary-blue: #00a8ff;
            --bg-color: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }

        /* 极简 UI 顶部栏 */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            color: white;
            z-index: 10;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 结束面板 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: all 0.3s ease;
        }

        #overlay h1 {
            font-size: 3rem;
            margin: 0;
            color: #333;
        }

        #overlay p {
            font-size: 1.2rem;
            color: #666;
            margin: 20px 0;
        }

        button {
            padding: 12px 40px;
            font-size: 1rem;
            background: #333;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            background: #000;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div class="stat-box">FLOOR: <span id="floor-val">0</span> / 100</div>
    </div>
    <div id="overlay">
        <h1 id="status-title">GAME OVER</h1>
        <p>你最终到达了第 <span id="final-floor">0</span> 层</p>
        <button onclick="resetGame()">RESTART</button>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const floorVal = document.getElementById('floor-val');
    const overlay = document.getElementById('overlay');
    const finalFloor = document.getElementById('final-floor');
    const statusTitle = document.getElementById('status-title');

    // 适配分辨率
    canvas.width = 450;
    canvas.height = 700;

    // 游戏配置
    const CONFIG = {
        gravity: 0.6,
        jump: -13,
        moveSpeed: 6,
        scrollSpeed: 2.2,
        platHeight: 12,
        playerW: 24, // 保持尺寸，增加像素细节
        playerH: 40  // 保持尺寸，增加像素细节
    };

    let state = {
        player: {},
        platforms: [],
        stars: [],
        keys: {},
        score: 0,
        isOver: false,
        lastPlatX: canvas.width / 2
    };

    // 初始化星空
    function initStars() {
        state.stars = [];
        for (let i = 0; i < 80; i++) {
            state.stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                opacity: Math.random(),
                speed: 0.01 + Math.random() * 0.02
            });
        }
    }

    // 生成平台（修复间隙逻辑）
    function spawnPlatform(y, type = 'normal') {
        const minW = 70, maxW = 120;
        const width = minW + Math.random() * (maxW - minW);
        
        let minX = Math.max(20, state.lastPlatX - 150);
        let maxX = Math.min(canvas.width - width - 20, state.lastPlatX + 150);
        
        const x = minX + Math.random() * (maxX - minX);
        
        state.lastPlatX = x;
        
        if (state.score > 5 && Math.random() < Math.min(state.score * 0.005, 0.35)) {
            type = 'spike';
        }

        state.platforms.push({ x, y, width, height: CONFIG.platHeight, type });
    }

    function initGame() {
        state.score = 0;
        state.isOver = false;
        state.lastPlatX = canvas.width / 2 - 50;
        overlay.style.display = 'none';
        
        state.player = {
            x: canvas.width / 2 - 12,
            y: 150,
            vx: 0,
            vy: 0,
            facing: 1 // 1 right, -1 left
        };

        state.platforms = [];
        state.platforms.push({ 
            x: canvas.width / 2 - 60, 
            y: 300, 
            width: 120, 
            height: CONFIG.platHeight, 
            type: 'normal' 
        });

        let nextY = 300 + 110;
        while (nextY < canvas.height + 100) {
            spawnPlatform(nextY);
            nextY += 110;
        }

        initStars();
        loop();
    }

    // 重写 drawPlayer，实现立绘级像素细节
    function drawPlayer() {
        const p = state.player;
        ctx.save();
        ctx.translate(p.x + CONFIG.playerW / 2, p.y + CONFIG.playerH / 2);
        if (p.facing === -1) ctx.scale(-1, 1);
        
        const w = CONFIG.playerW;
        const h = CONFIG.playerH;

        // 1. 裤子 & 立绘细节绑带
        ctx.fillStyle = '#1a1a1a'; // 裤子黑
        ctx.fillRect(-w/2 + 4, 0, w - 8, h/2); // 整体裤子
        
        // 绘制立绘右腿（对观者来说左侧）的白色绑带
        ctx.fillStyle = '#FFFFFF';
        // 在裤子内部绘制一条细绑带，注意 facing 处理
        if (p.facing === 1) { // 向右看，右腿在左侧
             ctx.fillRect(-w/2 + 4, 10, 2, 8); // 绑带位置
        } else { // 向左看，右腿（现映射至右侧）仍在右侧
             ctx.fillRect(w/2 - 6, 10, 2, 8); // 绑带位置
        }

        // 2. 复杂服装渲染 (深蓝/灰嵌块外套 + 内部白色帽衫)
        ctx.fillStyle = '#FFFFFF'; // 白色内部帽衫（领口、拉链区域）
        ctx.fillRect(-w/2 + 2, -h/2 + 6, w - 4, h * 0.7); 

        // 深海军蓝嵌块 (主外套)
        ctx.fillStyle = '#1D2A4F'; 
        ctx.fillRect(-w/2, -h/2 + 8, w * 0.65, h * 0.6); // 外套左侧大嵌块
        ctx.fillRect(w/2 - 6, -h/2 + 10, 4, h * 0.55); // 身体拉链右侧深蓝窄嵌块

        // 灰色嵌块
        ctx.fillStyle = '#4A5B69'; 
        ctx.fillRect(-w/2 + w * 0.65, -h/2 + 10, w - w * 0.65 - 6, h * 0.55); // 中间灰色嵌块

        // 外套上微小的抽象标签细节
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(w/2 - w * 0.7, -h/2 + 14, 2, 3); // 模仿白色标签像素块

        // 3. 头部 & 精确的头发设计
        ctx.fillStyle = '#ffdbac'; // 脸肤色
        ctx.fillRect(-w/2 + 6, -h/2 + 2, w - 12, 10);
        
        // 头发基色为红色
        ctx.fillStyle = '#C61B23'; 
        ctx.fillRect(-w/2 + 4, -h/2 - 2, w - 8, 6); // 顶部发束轮廓
        ctx.fillRect(-w/2 + 4, -h/2 + 2, 4, 4); // 侧边发色

        // 额发挑染：红色刘海内部嵌入油黑色像素块
        // 红色刘海基础
        ctx.fillStyle = '#C61B23';
        ctx.fillRect(-w/2 + 6, -h/2 + 2, 4, 4); 
        // 额发油黑挑染 (立绘细节)
        ctx.fillStyle = '#120E15'; // 接近立绘的油黑色
        ctx.fillRect(-w/2 + 6, -h/2 + 4, 2, 2); // 黑色挑染像素块
        ctx.fillRect(-w/2 + 8, -h/2 + 2, 2, 2); // 另一个黑色挑染像素块

        // 4. 眼睛
        ctx.fillStyle = '#000';
        ctx.fillRect(w/2 - 8, -h/2 + 6, 2, 2);

        ctx.restore();
    }

    function drawPlatform(plat) {
        ctx.save();
        
        if (plat.type === 'normal') {
            const grad = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y + plat.height);
            grad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
            grad.addColorStop(1, 'rgba(200, 220, 255, 0.8)');
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255,255,255,0.3)';
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(plat.x, plat.y, plat.width, plat.height, 6);
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(255,255,255,1)';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.roundRect(plat.x, plat.y + 4, plat.width, plat.height - 4, 4);
            ctx.fill();
            
            for (let i = 0; i < plat.width; i += 10) {
                ctx.moveTo(plat.x + i, plat.y + 4);
                ctx.lineTo(plat.x + i + 5, plat.y - 4);
                ctx.lineTo(plat.x + i + 10, plat.y + 4);
            }
            ctx.fill();
        }
        ctx.restore();
    }

    function update() {
        if (state.isOver) return;

        const p = state.player;

        if (state.keys['ArrowLeft'] || state.keys['a']) {
            p.vx = -CONFIG.moveSpeed;
            p.facing = -1;
        } else if (state.keys['ArrowRight'] || state.keys['d']) {
            p.vx = CONFIG.moveSpeed;
            p.facing = 1;
        } else {
            p.vx *= 0.8;
        }

        p.vy += CONFIG.gravity;
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = 0;
        if (p.x > canvas.width - CONFIG.playerW) p.x = canvas.width - CONFIG.playerW;

        let onAny = false;
        for (let i = state.platforms.length - 1; i >= 0; i--) {
            let plat = state.platforms[i];
            plat.y -= CONFIG.scrollSpeed;

            if (p.vy > 0 && 
                p.y + CONFIG.playerH >= plat.y && 
                p.y + CONFIG.playerH <= plat.y + plat.height + p.vy &&
                p.x + CONFIG.playerW > plat.x && 
                p.x < plat.x + plat.width) {
                
                if (plat.type === 'spike') {
                    endGame(false);
                    return;
                }

                p.y = plat.y - CONFIG.playerH;
                p.vy = 0;
                onAny = true;
                
                if (state.keys['ArrowUp'] || state.keys['w'] || state.keys[' ']) {
                    p.vy = CONFIG.jump;
                }
            }

            if (plat.y < -20) {
                state.platforms.splice(i, 1);
                state.score++;
                floorVal.innerText = state.score;
                if (state.score >= 100) endGame(true);
            }
        }

        const lastP = state.platforms[state.platforms.length - 1];
        if (lastP && lastP.y < canvas.height) {
            spawnPlatform(lastP.y + 110);
        }

        if (p.y > canvas.height || p.y < -50) {
            endGame(false);
        }

        state.stars.forEach(s => {
            s.opacity += s.speed;
            if (s.opacity > 1 || s.opacity < 0.2) s.speed *= -1;
        });
    }

    function draw() {
        const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0, '#0a0a12');
        sky.addColorStop(1, '#1a1a2e');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        state.stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });

        state.platforms.forEach(drawPlatform);
        drawPlayer();
    }

    function loop() {
        update();
        draw();
        if (!state.isOver) requestAnimationFrame(loop);
    }

    function endGame(win) {
        state.isOver = true;
        overlay.style.display = 'flex';
        finalFloor.innerText = state.score;
        statusTitle.innerText = win ? "MISSION COMPLETE" : "GAME OVER";
        statusTitle.style.color = win ? "#2ed573" : "#ff4757";
    }

    function resetGame() {
        initGame();
    }

    window.addEventListener('keydown', e => state.keys[e.key] = true);
    window.addEventListener('keyup', e => state.keys[e.key] = false);

    initGame();
</script>

</body>
</html>
